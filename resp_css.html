<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Responsividade na mão - CSS </title>
</head>
<body>

    <style>

        .item{
            width: 100%;
            height: 40px;
            background-color: coral;
            margin-top: 5px;
        }

        @media (min-width: 576px) {
            .linha{
                display: flex;

            }
            .item{
                background-color: blue;
            }
        }

    </style>

    <div class="caixa">
        <div class="linha">
            <div class="item">1</div>
            <div class="item">2</div>
            <div class="item">3</div>
        </div>
    </div>

</body>
</html>
